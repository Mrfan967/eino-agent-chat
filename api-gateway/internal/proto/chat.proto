syntax = "proto3";

package chat;
option go_package = "awesomeProject/api-gateway/internal/proto/chat";

service ChatService {
    // 流式聊天
    rpc Stream(stream ChatReq) returns (stream ChatChunk);
    // 非流式聊天
    rpc Chat(ChatReq) returns (ChatResp);
}

enum Role {
    UNKNOWN = 0;
    USER = 1;
    ASSISTANT = 2;
    SYSTEM = 3;
}

message ChatMessage {
    Role role = 1;
    string content = 2;
}

message ChatReq {
    string session_id = 1;
    string model = 2;
    string message = 3;
    repeated ChatMessage history = 4;
}

message ChatChunk {
    string content = 1;
    bool done = 2;
    string error = 3;
    string image = 4;
}

message ChatResp {
    string session_id = 1;
    string content = 2;
    string model = 3;
    string image = 4;
    int32 token_count = 5;
}
